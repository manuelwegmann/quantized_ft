mode: ssql
use_aux_loss: true    # L_ssql + L_fp  (SSQL paper Table 8, row i)

backbone:
  checkpoint: ${CT_CLIP_ROOT}/checkpoints/CT-CLIP_v2.pt
  use_pre_vq: false

data:
  data_folder:  ${CT_CLIP_ROOT}/data/merlin_data
  reports_file: ${CT_CLIP_ROOT}/data/reports_final.xlsx
  meta_file:    ${CT_CLIP_ROOT}/data/metadata.csv

augmentation:
  crop_ratio:       0.85
  flip_p:           0.5
  intensity_jitter: true
  gaussian_noise:   true
  noise_std:        0.01

quantization:
  w_bits_min: 2
  w_bits_max: 8
  a_bits_min: 4
  a_bits_max: 8

training:
  batch_size:   2
  lr:           0.05
  momentum:     0.9
  weight_decay: 1.0e-4
  epochs:       100
  num_workers:  4
  save_every:   10

projector:
  in_dim:     512
  hidden_dim: 2048
  out_dim:    2048

predictor:
  in_dim:     2048
  hidden_dim: 512
  out_dim:    2048

output_dir: ${QFT_ROOT}/runs/pretrain_ssql
