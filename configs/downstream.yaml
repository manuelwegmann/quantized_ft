# Path to a pretrain checkpoint (checkpoint_final.pt from run_pretrain.py).
# Override on the command line: --pretrain_checkpoint /path/to/checkpoint_final.pt
pretrain_checkpoint: ${QFT_ROOT}/runs/pretrain_fp/checkpoint_final.pt

backbone:
  checkpoint: ${CT_CLIP_ROOT}/checkpoints/CT-CLIP_v2.pt  # used only if no pretrain_checkpoint
  use_pre_vq: false

data:
  data_folder:  ${CT_CLIP_ROOT}/data/merlin_data
  reports_file: ${CT_CLIP_ROOT}/data/reports_final.xlsx
  labels_file:  ${CT_CLIP_ROOT}/data/zero_shot_findings_disease_cls.csv
  meta_file:    ${CT_CLIP_ROOT}/data/metadata.csv
  split_seed:   42

training:
  batch_size:   4
  lr:           1.0e-3
  weight_decay: 0.0
  epochs:       50
  num_workers:  4

freeze_backbone: true   # true = linear probe; false = full fine-tuning

n_classes: 30

output_dir: ${QFT_ROOT}/runs/downstream_fp
